name: Auto Tag

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    name: Bump version and tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest
        run: |
          TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          echo "tag=${TAG:-v0.0.0}" >> "$GITHUB_OUTPUT"

      - name: Determine bump type from commits
        id: bump
        run: |
          LATEST="${{ steps.latest.outputs.tag }}"
          # Get commits since last tag
          if git rev-parse "$LATEST" >/dev/null 2>&1; then
            COMMITS=$(git log "$LATEST"..HEAD --oneline)
          else
            COMMITS=$(git log --oneline -1)
          fi

          BUMP="patch"
          if echo "$COMMITS" | grep -qiE "BREAKING CHANGE|^[a-z]+!:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^[0-9a-f]+ feat"; then
            BUMP="minor"
          fi
          echo "type=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Bump: $BUMP (from $LATEST)"

      - name: Calculate next version
        id: next
        run: |
          CURRENT="${{ steps.latest.outputs.tag }}"
          CURRENT="${CURRENT#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          BUMP="${{ steps.bump.outputs.type }}"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next: $NEXT"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.next.outputs.version }}" -m "Release ${{ steps.next.outputs.version }}"
          git push origin "${{ steps.next.outputs.version }}"
