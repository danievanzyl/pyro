name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  tag:
    name: Bump version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.next.outputs.version }}
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest
        run: |
          TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          echo "tag=${TAG:-v0.0.0}" >> "$GITHUB_OUTPUT"

      - name: Check if HEAD is already tagged
        id: check
        run: |
          if git describe --exact-match HEAD 2>/dev/null | grep -q '^v'; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine bump type
        if: steps.check.outputs.changed == 'true'
        id: bump
        run: |
          LATEST="${{ steps.latest.outputs.tag }}"
          if git rev-parse "$LATEST" >/dev/null 2>&1; then
            COMMITS=$(git log "$LATEST"..HEAD --oneline)
          else
            COMMITS=$(git log --oneline -1)
          fi
          BUMP="patch"
          if echo "$COMMITS" | grep -qiE "BREAKING CHANGE|^[a-z]+!:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^[0-9a-f]+ feat"; then
            BUMP="minor"
          fi
          echo "type=$BUMP" >> "$GITHUB_OUTPUT"

      - name: Calculate next version
        if: steps.check.outputs.changed == 'true'
        id: next
        run: |
          CURRENT="${{ steps.latest.outputs.tag }}"
          CURRENT="${CURRENT#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          BUMP="${{ steps.bump.outputs.type }}"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next: $NEXT"

      - name: Create tag
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.next.outputs.version }}" -m "Release ${{ steps.next.outputs.version }}"
          git push origin "${{ steps.next.outputs.version }}"

  publish-python:
    name: Publish Python SDK
    needs: tag
    if: needs.tag.outputs.changed == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/
        continue-on-error: true

  publish-typescript:
    name: Publish TypeScript SDK
    needs: tag
    if: needs.tag.outputs.changed == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install
      - run: npm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

  release-binaries:
    name: GitHub Release
    needs: tag
    if: needs.tag.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: oven-sh/setup-bun@v2
      - name: Build UI
        run: cd ui && bun install && bun run build
      - name: Build Linux binaries
        run: make build-linux
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.version }}
          files: |
            bin/linux/pyro-server
            bin/linux/pyro-agent
            bin/linux/pyro
