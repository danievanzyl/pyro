<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="fire" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#F7C948"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#F7C948"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)"/>
  <rect width="900" height="300" fill="url(#grid)"/>

  <!-- Glow behind icon -->
  <circle cx="320" cy="135" r="80" fill="url(#glow)"/>

  <!-- Fire icon (Material Symbols local_fire_department filled, scaled) -->
  <g transform="translate(262, 68) scale(5.5)">
    <path d="M12 12.9l-2.13 2.09C9.31 15.55 9 16.28 9 17.06 9 18.68 10.35 20 12 20s3-1.32 3-2.94c0-.78-.31-1.52-.87-2.07L12 12.9z" fill="url(#fire)"/>
    <path d="M16 6l-.44.55C14.38 8.02 12 7.19 12 5.06V2S4 7 4 14c0 4.42 3.58 8 8 8s8-3.58 8-8C20 10.53 18.43 7.83 16 6zm-4 14c-1.65 0-3-1.32-3-2.94 0-.78.31-1.52.87-2.07L12 12.9l2.13 2.09c.56.55.87 1.29.87 2.07C15 18.68 13.65 20 12 20z" fill="url(#fire)" opacity="0.85"/>
  </g>

  <!-- Title "Pyro" — path-based for font independence -->
  <!-- P -->
  <g transform="translate(400, 90)" fill="#ffffff">
    <path d="M0 0h7c3.5 0 6.5 1 8.5 3s3 4.5 3 7.5-1 5.5-3 7.5-5 3-8.5 3H7v19H0V0zm7 15h1c1.8 0 3.2-.5 4.2-1.5s1.5-2.3 1.5-4-.5-3-1.5-4S10.8 4 9 4H7v11z" transform="scale(1.4)"/>
    <!-- y -->
    <path d="M30 0l7.5 22 7.5-22h7.5L39 38h-7l5-12L26 0h4z" transform="translate(22, 18) scale(1.1)"/>
    <!-- r -->
    <path d="M0 0h6v4c1-1.5 2-2.7 3.2-3.5 1.2-.8 2.5-1.2 4-1.2.5 0 1 0 1.5.1l.8.2V7c-.5-.2-1-.3-1.5-.3-.5-.1-1-.1-1.5-.1-1.5 0-2.8.5-3.8 1.4S7 10 7 11.5V26H0V0z" transform="translate(80, 18) scale(1.1)"/>
    <!-- o -->
    <path d="M14 0c-3.8 0-7 1.3-9.5 3.8S0 9.2 0 13s1.7 7 4.5 9.5S10.2 26 14 26s7-1.3 9.5-3.8S28 16.8 28 13s-1.7-7-4.5-9.5S17.8 0 14 0zm0 20c-2 0-3.5-.7-4.8-2.1S7 15.2 7 13s.5-3.7 1.6-5.1C9.7 6.5 11.5 5.5 14 5.5s3.8.8 5 2.2C20.2 9 21 10.8 21 13s-.7 3.7-2 5.2c-1.3 1.4-3 2-5 2z" transform="translate(105, 18) scale(1.1)"/>
  </g>

  <!-- Tagline -->
  <text x="400" y="175" font-family="Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="18" fill="#a0a0a0">Firecracker microVM sandboxes for AI agents</text>

  <!-- Feature pills -->
  <g transform="translate(400, 198)">
    <rect width="100" height="28" rx="14" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="50" y="18" font-family="Menlo, Consolas, monospace" font-size="11" fill="#c0c0c0" text-anchor="middle">Sub-second</text>

    <rect x="112" width="80" height="28" rx="14" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="152" y="18" font-family="Menlo, Consolas, monospace" font-size="11" fill="#c0c0c0" text-anchor="middle">Isolated</text>

    <rect x="204" width="95" height="28" rx="14" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="251.5" y="18" font-family="Menlo, Consolas, monospace" font-size="11" fill="#c0c0c0" text-anchor="middle">REST + WS</text>

    <rect x="311" width="110" height="28" rx="14" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="366" y="18" font-family="Menlo, Consolas, monospace" font-size="11" fill="#c0c0c0" text-anchor="middle">Python + TS</text>
  </g>

  <!-- Terminal line -->
  <text x="400" y="260" font-family="Menlo, Consolas, monospace" font-size="13">
    <tspan fill="#4ae176">$</tspan>
    <tspan fill="#808080"> pyro sandbox create --image python</tspan>
  </text>

  <!-- Bottom accent line -->
  <rect y="296" width="900" height="4" fill="url(#accent)"/>
</svg>
